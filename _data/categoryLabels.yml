# These are the default values for the technology category labels used in the _includes/categoryLabel.html template.
# All valees are the default values, used EVERYWHERE, so please be aware when making any changes here.

# The Category Items are mapped and accessible using thier item name.
# - category: is actually a css class that is passed through to set the colour of the item (background to the icon).
# - title: used as the label text for the item.
# - impactDimensions: a nested structure to hold customisations relevant to each impact dimension.
#   - carbon: customisations relevant to the carbon impact dimension.
#     - GHGScope: expected to be a number, what scope of the GHG Protocol does a category map to.

CatU:
  category: cat-u
  title: Category U
  impactDimensions:
    carbon:
      GHGScope: 3

CatO:
  category: cat-o
  title: Category O
  impactDimensions:
    carbon:
      GHGScope: 2 

CatG:
  category: cat-g
  title: Category G
  impactDimensions:
    carbon:
      GHGScope: 1  

CatC:
  category: cat-c
  title: Category C
  impactDimensions:
    carbon:
      GHGScope: 3

CatD:
  category: cat-d
  title: Category D
  impactDimensions:
    carbon:
      GHGScope: 3